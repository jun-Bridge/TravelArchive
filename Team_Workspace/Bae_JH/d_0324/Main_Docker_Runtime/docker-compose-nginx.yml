services:
  nginx:
    image: nginx:alpine
    container_name: travelarchive_nginx
    ports:
      # OMV NAS 시스템 포트와의 충돌을 완벽히 피하기 위해 외부 8080포트를 Nginx의 내부 80포트로 연결합니다.
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./resource:/usr/share/nginx/resource:ro
      - ./frontend:/usr/share/nginx/html
    networks:
      - TravelArchiveNetwork
    restart: always

networks:
  TravelArchiveNetwork:
    external: true