services:
  redis:
    image: redis:7-alpine
    container_name: TA_redis
    command: /bin/sh -c 'redis-server --requirepass "$${REDIS_PASSWORD}"'
    env_file:
      - ./setting/.env
    ports:
      - "6379:6379"
    volumes:
      - ./db/redis_data:/data
    networks:
      - TravelArchiveNetwork
    restart: always

networks:
  TravelArchiveNetwork:
    external: true