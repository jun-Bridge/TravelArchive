<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 처리 중...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .callback-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 360px;
      padding: 40px;
      text-align: center;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(102, 126, 234, 0.2);
      border-top-color: rgba(102, 126, 234, 1);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .callback-title {
      font-size: 20px;
      font-weight: 700;
      color: rgba(17, 24, 39, 0.95);
      margin-bottom: 8px;
    }

    .callback-subtitle {
      font-size: 14px;
      color: rgba(75, 85, 99, 0.7);
      margin-bottom: 24px;
    }

    .callback-status {
      font-size: 13px;
      color: rgba(102, 126, 234, 0.8);
      line-height: 1.6;
    }

    .error-container {
      display: none;
      text-align: center;
    }

    .error-container.show {
      display: block;
    }

    .error-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .error-title {
      font-size: 18px;
      font-weight: 700;
      color: rgba(139, 0, 0, 0.9);
      margin-bottom: 8px;
    }

    .error-message {
      font-size: 13px;
      color: rgba(75, 85, 99, 0.7);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .error-button {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: 10px;
      background: rgba(102, 126, 234, 1);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .error-button:hover {
      background: rgba(102, 126, 234, 0.85);
    }

    .success-container {
      display: none;
      text-align: center;
    }

    .success-container.show {
      display: block;
    }

    .success-icon {
      font-size: 48px;
      margin-bottom: 16px;
      animation: bounce 0.6s ease-out;
    }

    @keyframes bounce {
      0% { transform: scale(0); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .success-title {
      font-size: 18px;
      font-weight: 700;
      color: rgba(34, 197, 94, 0.9);
      margin-bottom: 8px;
    }

    .success-message {
      font-size: 13px;
      color: rgba(75, 85, 99, 0.7);
      margin-bottom: 12px;
    }

    .user-info {
      background: rgba(243, 244, 246, 1);
      border-radius: 10px;
      padding: 12px;
      margin-top: 16px;
      font-size: 12px;
    }

    .user-info-item {
      margin: 8px 0;
      color: rgba(55, 65, 81, 0.8);
    }
  </style>
</head>
<body>
  <div class="callback-container">
    <!-- 처리 중 -->
    <div class="loading-container" id="loadingContainer">
      <div class="spinner"></div>
      <h1 class="callback-title">로그인 처리 중</h1>
      <p class="callback-subtitle">잠시만 기다려주세요...</p>
      <p class="callback-status" id="callbackStatus">
        인증 코드를 확인하고 있습니다.
      </p>
    </div>

    <!-- 성공 -->
    <div class="success-container" id="successContainer">
      <div class="success-icon">✅</div>
      <h1 class="success-title">로그인 성공!</h1>
      <p class="success-message">환영합니다, <span id="userName"></span>님!</p>
      <div class="user-info">
        <div class="user-info-item">
          <strong>이메일:</strong> <span id="userEmail"></span>
        </div>
        <div class="user-info-item">
          곧 대시보드로 이동합니다...
        </div>
      </div>
    </div>

    <!-- 에러 -->
    <div class="error-container" id="errorContainer">
      <div class="error-icon">❌</div>
      <h1 class="error-title">로그인 실패</h1>
      <p class="error-message" id="errorMessage"></p>
      <button class="error-button" onclick="window.location.href='/login'">
        로그인 페이지로 돌아가기
      </button>
    </div>
  </div>

  <script type="module">
    import { KakaoAuthClient } from '/js/kakaoAuth.js';

    // 카카오 인증 클라이언트 초기화 (환경 변수 사용)
    const kakaoAuth = new KakaoAuthClient(
      import.meta.env.VITE_KAKAO_REST_API_KEY,
      import.meta.env.VITE_KAKAO_LOGIN_REDIRECT_URI
    );

    /**
     * 카카오 인증 서버로부터 리다이렉트된 후 인가 코드를 처리합니다.
     */
    async function handleCallback() {
      try {
        // 1. URL 쿼리 파라미터에서 인가 코드를 추출하고 백엔드와 통신하여 로그인을 완료합니다.
        const result = await kakaoAuth.handleCallback();

        // 2. 로그인 성공 시 사용자 정보를 화면에 표시합니다.
        showSuccess(result);

        // 3. 1.5초 후 사용자를 메인 대시보드 페이지로 이동시킵니다.
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 1500);

      } catch (error) {
        // 오류 발생 시 콘솔에 로그를 남기고 사용자에게 에러 메시지를 표시합니다.
        console.error('인증 콜백 처리 오류:', error);
        showError(error.message || '로그인 처리 중 예상치 못한 오류가 발생했습니다.');
      }
    }

    /**
     * 로그인 성공 화면을 활성화하고 사용자 정보를 바인딩합니다.
     * @param {object} result 인증 결과 데이터
     */
    function showSuccess(result) {
      const { user } = result;

      // 로딩 컨테이너 숨김 및 성공 컨테이너 표시
      document.getElementById('loadingContainer').style.display = 'none';
      document.getElementById('successContainer').classList.add('show');

      // 사용자 닉네임 및 이메일 표시
      document.getElementById('userName').textContent = user.nickname || '사용자';
      document.getElementById('userEmail').textContent = user.email || '정보 없음';
    }

    /**
     * 로그인 실패 화면을 활성화하고 오류 메시지를 표시합니다.
     * @param {string} message 표시할 오류 메시지
     */
    function showError(message) {
      // 로딩 컨테이너 숨김 및 에러 컨테이너 표시
      document.getElementById('loadingContainer').style.display = 'none';
      document.getElementById('errorContainer').classList.add('show');
      
      // 구체적인 에러 메시지 삽입
      document.getElementById('errorMessage').textContent = message;
    }

    // 페이지 로드 시 즉시 콜백 처리 로직 실행
    handleCallback();
  </script>
</body>
</html>
