<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        * { margin: 0; padding: 0; box-sizing: content-box; }
        html, body, #map { width: 100%; height: 100%; }
    </style>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=732deb75610e056340f0cb6273d025a8"></script>
</head>
<body>
	<div id="map"></div>
	<script>
		var container = document.getElementById('map');
		var options = {
			center: new kakao.maps.LatLng(33.450701, 126.570667),
			level: 3
		};
		var map = new kakao.maps.Map(container, options);

        // 부모(index.html)로부터 메시지 수신
        window.addEventListener('message', (e) => {
        const { type, lat, lng, title } = e.data;

        if (type === 'MOVE_TO') {
            const pos = new kakao.maps.LatLng(lat, lng);
            map.setCenter(pos);

            const marker = new kakao.maps.Marker({ position: pos, map });
            const infoWindow = new kakao.maps.InfoWindow({
                content: `<div style="padding:6px 10px;font-size:13px;">${title}</div>`
            });
            infoWindow.open(map, marker);
        }
        });
	</script>
</body>
</html>
