<div class="sidebar-item-wrapper" data-session-id="{{sessionId}}">
  <button class="sidebar-item" data-session-id="{{sessionId}}">
    <span class="dot"></span>{{title}}
  </button>
  <input class="sidebar-item-edit-input" type="text" value="{{title}}" style="display: none;">
  <div class="session-actions">
    <button class="session-action-btn more-btn" title="메뉴">[[More]]</button>
    <div class="session-dropdown-menu">
      <div class="dropdown-item edit-btn">
        <span class="icon">[[Edit]]</span>
        <span>이름 변경</span>
      </div>
      <div class="dropdown-item invite-btn" style="display: none;">
        <span class="icon">[[UserPlus]]</span>
        <span>여행친구 초대</span>
      </div>
      <div class="dropdown-item team-planner-btn">
        <span class="icon">[[Map]]</span>
        <span>팀 플래너 이동</span>
      </div>
      <div class="dropdown-divider"></div>
      <div class="dropdown-item delete-btn danger">
        <span class="icon">[[Trash]]</span>
        <span>삭제</span>
      </div>
    </div>
  </div>
</div>
